name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run test

      - run: bun run build

      - run: bun run zip

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: yt-lyrics-${{ github.sha }}
          path: .output/*.zip
          if-no-files-found: error
          retention-days: 90
